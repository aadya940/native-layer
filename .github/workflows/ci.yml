name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: pip install scikit-build-core pybind11 cmake

      - name: Build and install package
        run: pip install -e . --no-build-isolation

      - name: Compile test plugin (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /LD /EHsc /O2 /std:c++17 ^
            native_layer\tests\plugins\libmath.cpp ^
            /I native_layer\include ^
            /Fe:native_layer\tests\plugins\libmath.dll

      - name: Compile test plugin (Linux)
        if: runner.os == 'Linux'
        run: |
          g++ -shared -fPIC -O2 -std=c++17 \
            native_layer/tests/plugins/libmath.cpp \
            -I native_layer/include \
            -o native_layer/tests/plugins/libmath.so

      - name: Compile test plugin (macOS)
        if: runner.os == 'macOS'
        run: |
          clang++ -shared -fPIC -O2 -std=c++17 \
            -undefined dynamic_lookup \
            native_layer/tests/plugins/libmath.cpp \
            -I native_layer/include \
            -o native_layer/tests/plugins/libmath.dylib

      - name: Run tests
        run: pytest native_layer/tests/ -v

        